apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: microservicios-ia
    service: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      service: gateway
  template:
    metadata:
      labels:
        service: gateway
    spec:
      containers:
      - name: api-gateway
        image: TU_USUARIO/api-gateway:latest
        ports:
        - containerPort: 80
        env:
        - name: TASK_SERVICE_URL
          value: "http://task-service:80"
        - name: AI_SERVICE_URL
          value: "http://ai-service:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    service: gateway
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer  # Expone al mundo exterior

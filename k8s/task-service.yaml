apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  labels:
    app: microservicios-ia
    service: task
spec:
  replicas: 3  # 3 réplicas para alta disponibilidad
  selector:
    matchLabels:
      service: task
  template:
    metadata:
      labels:
        service: task
    spec:
      containers:
      - name: task-service
        image: TU_USUARIO/task-service:latest
        ports:
        - containerPort: 80
        env:
        - name: AI_SERVICE_URL
          value: "http://ai-service:8080"
        - name: REDIS_URL
          value: "redis-service:6379"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
spec:
  selector:
    service: task
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
